name: Publish to NPM

# 核心改进：锁定只有在 GitHub 页面手动发布 Release 时才触发
# 哪怕你天天推 README.md，流水线也绝对不会乱开枪
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # 使用 npm ci 代替 npm install，严格锁定 package-lock.json 里的依赖版本，保证 CI 环境绝对干净
      - name: Install dependencies
        run: npm ci

      # 自带安全垫：如果你的 package.json 里有 build 脚本就自动跑，没有就安全跳过，绝不报错挂起
      - name: Build project
        run: npm run build --if-present

      # 物理推包，自动读取你在 GitHub Secrets 里配置的 NPM_TOKEN
      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
